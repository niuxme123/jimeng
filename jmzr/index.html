<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即梦AI自动化控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 460px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 20px;
            color: #4ade80;
        }

        .version-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
        }

        .version-cn {
            background: #ef4444;
        }

        .version-intl {
            background: #3b82f6;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #4ade80;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        select, input, textarea {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            margin-bottom: 8px;
        }

        select option {
            background: #1a1a2e;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .status-bar {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
            margin-top: 8px;
            font-family: monospace;
            max-height: 120px;
            overflow-y: auto;
        }

        .status-item {
            margin-bottom: 4px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .status-success {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-info {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .status-warning {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .materials-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .video-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .video-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 12px;
            word-break: break-all;
        }

        .video-item .url {
            color: #60a5fa;
            margin-bottom: 4px;
        }

        .video-item .time {
            color: #888;
            font-size: 11px;
        }

        .video-item .source {
            color: #4ade80;
            font-size: 10px;
            margin-top: 2px;
        }

        .watermark-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            margin-left: 6px;
        }

        .watermark-free {
            background: #22c55e;
            color: white;
        }

        .watermark-unknown {
            background: #f59e0b;
            color: white;
        }

        .current-account {
            background: rgba(74, 222, 128, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .current-account .label {
            color: #888;
            font-size: 11px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-success {
            background: #22c55e;
        }

        .badge-warning {
            background: #f59e0b;
        }

        .login-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .login-status.logged-in {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .login-status.not-logged-in {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .qr-section {
            text-align: center;
            padding: 16px;
        }

        .qr-tip {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }

        .api-info {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-top: 16px;
        }

        .api-info code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .hidden {
            display: none;
        }

        .login-time {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            即梦AI自动化控制台
            <span class="version-badge version-cn">国内版</span>
        </h1>

        <!-- 登录状态 -->
        <div class="card">
            <div class="card-title">登录状态</div>
            <div id="loginStatus" class="login-status not-logged-in">
                <div>
                    <span>状态: <span id="loginStatusText">检测中...</span></span>
                    <div class="login-time" id="loginTime"></div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" style="width: auto; padding: 6px 12px; margin: 0;" id="checkStatusBtn">检查</button>
                    <button class="btn btn-danger" style="width: auto; padding: 6px 12px; margin: 0; display: none;" id="logoutBtn">退出</button>
                </div>
            </div>
        </div>

        <!-- 扫码登录（国内版） -->
        <div class="card" id="qrLoginCard">
            <div class="card-title">扫码登录</div>
            <div class="qr-section">
                <p style="margin-bottom: 12px; font-size: 13px;">国内版使用抖音/剪映APP扫码登录</p>
                <button class="btn btn-success" id="showQRBtn">显示登录二维码</button>
                <p class="qr-tip" id="qrTip">点击按钮后，请在弹出的窗口中扫码</p>
            </div>
        </div>

        <!-- 账号管理 -->
        <div class="card" id="accountCard">
            <div class="card-title">账号管理 <span id="accountCount" style="font-size: 11px; color: #888;"></span></div>
            <div id="currentAccount" class="current-account hidden">
                <span class="label">当前登录:</span>
                <span id="currentAccountName">-</span>
            </div>
            <div id="startAccountDiv" class="hidden" style="margin-bottom: 8px;">
                <label style="font-size: 12px; color: #888; margin-bottom: 4px; display: block;">选择要登录的账号:</label>
                <select id="startAccountSelect" style="margin-bottom: 8px;">
                </select>
                <button class="btn btn-primary" id="copyAccountBtn" style="margin-left: 8px; padding: 4px 8px; font-size: 11px;">复制账号</button>
                <!-- 手动重试按钮区域 -->
                <div style="display: flex; gap: 8px; margin-top: 8px;">
                    <button class="btn btn-warning" id="retryLoginBtn" disabled style="flex: 1;">重试登录</button>
                    <button class="btn btn-info" id="setParamsBtn" disabled style="flex: 1;">设置默认参数</button>
                </div>
            </div>
            <button class="btn btn-primary" id="loadAccountsBtn">加载账号文件</button>
            <button class="btn btn-success" id="loginBtn" disabled>邮箱登录选中账号</button>
            <div id="loggedInAccounts" style="margin-top: 8px; font-size: 12px;"></div>

            <!-- 任务提交区域 -->
            <div id="taskSubmitArea" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); display: none;">
                <div style="font-size: 12px; color: #4ade80; margin-bottom: 8px;">当前窗口: <span id="currentWindowTitle">-</span></div>
                <textarea id="taskText" placeholder="输入视频生成文案..." style="margin-bottom: 8px;"></textarea>
                <button class="btn btn-warning" id="submitTaskBtn" disabled>提交生成任务</button>
                <button class="btn btn-primary" id="analyzePageBtn" style="margin-top: 8px;">分析页面结构</button>
            </div>
        </div>

        <!-- 素材管理 -->
        <div class="card">
            <div class="card-title">素材管理 <span id="materialsInfo" style="font-size: 11px; color: #888;"></span></div>
            <div id="currentMaterialsFolder" style="font-size: 12px; color: #888; margin-bottom: 8px; word-break: break-all;"></div>
            <button class="btn btn-primary" id="selectMaterialsBtn">选择素材文件夹</button>
            <button class="btn btn-success" id="uploadMaterialsBtn" disabled style="margin-top: 8px;">上传素材到页面</button>
            <div id="materialsList" class="materials-list" style="margin-top: 8px; font-size: 12px;"></div>
        </div>

        <!-- 视频拦截（按窗口分类） -->
        <div class="card">
            <div class="card-title">
                拦截的视频
                <span class="badge badge-success" id="videoCount">0</span>
            </div>
            <div id="videosByWindow" style="font-size: 12px;">
                <div class="status-item status-info">等待账号登录后拦截视频...</div>
            </div>
            <button class="btn btn-success" id="extractVideosBtn" style="margin-top: 8px;">提取当前页面视频</button>
            <button class="btn btn-primary" id="downloadAllBtn" style="margin-top: 8px;" disabled>下载全部视频</button>
            <button class="btn btn-danger" id="clearVideosBtn" style="margin-top: 8px;">清空拦截记录</button>
        </div>

        <!-- 快捷操作 -->
        <div class="card">
            <div class="card-title">快捷操作</div>
            <button class="btn btn-primary" id="openJimengBtn">打开即梦网站</button>
        </div>

        <!-- 状态日志 -->
        <div class="card">
            <div class="card-title">状态日志</div>
            <div class="status-bar" id="statusLog">
                <div class="status-item status-info">系统启动中...</div>
            </div>
        </div>

        <!-- API 信息 -->
        <div class="api-info">
            v1.6.0 | API 服务: <code>http://localhost:3690</code>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // 状态
        let accounts = [];
        let currentAccountIndex = -1;
        let videosByWindow = {}; // { windowId: [videos] }
        let isLoggedIn = false;

        // DOM 元素
        const currentAccountDiv = document.getElementById('currentAccount');
        const currentAccountName = document.getElementById('currentAccountName');
        const videoCount = document.getElementById('videoCount');
        const statusLog = document.getElementById('statusLog');
        const loginStatus = document.getElementById('loginStatus');
        const loginStatusText = document.getElementById('loginStatusText');

        // 日志函数
        function log(message, type = 'info') {
            const item = document.createElement('div');
            item.className = `status-item status-${type}`;
            item.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            statusLog.appendChild(item);
            statusLog.scrollTop = statusLog.scrollHeight;
        }

        // 更新登录状态显示
        function updateLoginStatus(status) {
            isLoggedIn = status.isLoggedIn;
            const logoutBtn = document.getElementById('logoutBtn');
            const loginTime = document.getElementById('loginTime');

            if (status.isLoggedIn) {
                loginStatus.className = 'login-status logged-in';
                loginStatusText.textContent = status.username ? `已登录: ${status.username}` : '已登录';
                document.getElementById('submitTaskBtn').disabled = false;
                logoutBtn.style.display = 'inline-block';

                // 显示登录时间
                if (status.lastLoginTime) {
                    const date = new Date(status.lastLoginTime);
                    loginTime.textContent = `登录时间: ${date.toLocaleString()}`;
                }
            } else {
                loginStatus.className = 'login-status not-logged-in';
                loginStatusText.textContent = '未登录';
                document.getElementById('submitTaskBtn').disabled = true;
                logoutBtn.style.display = 'none';
                loginTime.textContent = '';
            }
        }

        // 更新账号选择框（已删除旧的select，改用startAccountSelect）
        function updateAccountSelect() {
            // 不再需要，保留空函数避免报错
        }

        // 更新开始账号选择框
        function updateStartAccountSelect() {
            const startSelect = document.getElementById('startAccountSelect');
            const startDiv = document.getElementById('startAccountDiv');
            const countSpan = document.getElementById('accountCount');
            const loginBtn = document.getElementById('loginBtn');

            if (accounts.length === 0) {
                startDiv.classList.add('hidden');
                countSpan.textContent = '';
                loginBtn.disabled = true;
                return;
            }

            countSpan.textContent = `(共 ${accounts.length} 个账号)`;
            startDiv.classList.remove('hidden');

            startSelect.innerHTML = '';
            accounts.forEach((acc, index) => {
                const option = document.createElement('option');
                option.value = index;
                // acc 现在是 { email, password } 对象
                const email = acc.email || acc;
                option.textContent = `第${index + 1}个: ${email}`;
                startSelect.appendChild(option);
            });

            // 默认选中第一个账号并启用登录按钮
            startSelect.value = '0';
            loginBtn.disabled = false;
        }

        // 更新视频列表（按窗口分类）
        function updateVideoList() {
            const container = document.getElementById('videosByWindow');

            // 计算总视频数
            let totalVideos = 0;
            Object.values(videosByWindow).forEach(videos => {
                totalVideos += videos.length;
            });
            videoCount.textContent = totalVideos;

            if (totalVideos === 0) {
                container.innerHTML = '<div class="status-item status-info">等待账号登录后拦截视频...</div>';
                document.getElementById('downloadAllBtn').disabled = true;
                return;
            }

            container.innerHTML = '';

            // 按窗口显示视频
            Object.entries(videosByWindow).forEach(([windowId, videos]) => {
                if (videos.length === 0) return;

                // 查找对应的账号信息
                const account = loggedInAccounts.find(a => a.windowId === windowId);
                const displayName = account ? account.email : windowId;

                const windowDiv = document.createElement('div');
                windowDiv.style.cssText = 'margin-bottom: 12px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 4px;';

                windowDiv.innerHTML = `
                    <div style="color: #4ade80; font-weight: bold; margin-bottom: 8px; font-size: 11px;">
                        📹 ${displayName} (${videos.length}个)
                    </div>
                `;

                videos.forEach((video, index) => {
                    const item = document.createElement('div');
                    item.className = 'video-item';
                    item.style.cssText = 'font-size: 11px; padding: 6px; margin-bottom: 4px;';

                    const watermarkBadge = video.isWatermarkFree
                        ? '<span class="watermark-badge watermark-free">无水印</span>'
                        : '<span class="watermark-badge watermark-unknown">未知</span>';

                    const shortUrl = video.url.length > 40
                        ? video.url.substring(0, 40) + '...'
                        : video.url;

                    item.innerHTML = `
                        <div class="url" title="${video.url}" style="font-size: 10px; color: #888;">${shortUrl}</div>
                        <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
                            ${watermarkBadge}
                            <span class="time" style="font-size: 10px;">${video.timestamp || ''}</span>
                        </div>
                        <div style="display: flex; gap: 4px; margin-top: 4px;">
                            <button class="btn btn-primary" style="flex: 1; font-size: 10px; padding: 4px;" onclick="downloadVideo('${windowId}', ${index})">
                                下载
                            </button>
                            <button class="btn btn-warning" style="flex: 1; font-size: 10px; padding: 4px;" onclick="copyVideoUrl('${windowId}', ${index})">
                                复制
                            </button>
                        </div>
                    `;
                    windowDiv.appendChild(item);
                });

                container.appendChild(windowDiv);
            });

            document.getElementById('downloadAllBtn').disabled = false;
        }

        // 复制视频链接
        function copyVideoUrl(windowId, index) {
            const video = videosByWindow[windowId]?.[index];
            if (video) {
                require('electron').clipboard.writeText(video.url);
                log('视频链接已复制到剪贴板', 'success');
            }
        }

        // 下载视频
        async function downloadVideo(windowId, index) {
            const video = videosByWindow[windowId]?.[index];
            if (!video) return;

            const filename = `video_${Date.now()}_${index}.mp4`;
            log(`正在下载视频...`, 'info');

            try {
                const result = await ipcRenderer.invoke('download-video', {
                    url: video.url,
                    filename: filename
                });

                if (result.success) {
                    log(`视频下载成功: ${result.path}`, 'success');
                } else if (result.canceled) {
                    log('已取消保存', 'warning');
                } else {
                    log(`视频下载失败: ${result.error}`, 'error');
                }
            } catch (error) {
                log(`下载错误: ${error.message}`, 'error');
            }
        }

        // 事件监听

        // 检查登录状态
        document.getElementById('checkStatusBtn').addEventListener('click', async () => {
            log('检查登录状态...', 'info');
            const status = await ipcRenderer.invoke('check-login-status');
            updateLoginStatus(status);
            log(`登录状态: ${status.isLoggedIn ? '已登录' : '未登录'}`, status.isLoggedIn ? 'success' : 'warning');
        });

        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            log('退出登录...', 'info');
            const result = await ipcRenderer.invoke('logout');
            if (result.success) {
                updateLoginStatus({ isLoggedIn: false });
                log('已退出登录', 'warning');
            }
        });

        // 显示登录二维码
        document.getElementById('showQRBtn').addEventListener('click', async () => {
            log('正在显示登录二维码...', 'info');
            document.getElementById('showQRBtn').disabled = true;

            const result = await ipcRenderer.invoke('show-qr-login');

            if (result.success) {
                log('二维码已显示，请扫码登录', 'success');
                document.getElementById('qrTip').textContent = result.message || '请在弹出的窗口中扫码登录';

                // 定时检查登录状态
                let checkCount = 0;
                const checkInterval = setInterval(async () => {
                    checkCount++;
                    if (checkCount > 60) { // 最多检查60次，每次2秒
                        clearInterval(checkInterval);
                        log('扫码超时，请重新获取二维码', 'warning');
                        document.getElementById('showQRBtn').disabled = false;
                        return;
                    }

                    const status = await ipcRenderer.invoke('check-login-status');
                    if (status.isLoggedIn) {
                        clearInterval(checkInterval);
                        updateLoginStatus(status);
                        log('扫码登录成功!', 'success');
                        document.getElementById('showQRBtn').disabled = false;
                    }
                }, 2000);
            } else {
                log(`显示二维码失败: ${result.error}`, 'error');
            }

            document.getElementById('showQRBtn').disabled = false;
        });

        // 加载账号文件
        document.getElementById('loadAccountsBtn').addEventListener('click', async () => {
            log('加载账号文件...', 'info');
            await ipcRenderer.invoke('load-accounts');
        });

        // 账号选择
        const startAccountSelect = document.getElementById('startAccountSelect');
        startAccountSelect.addEventListener('change', () => {
            document.getElementById('loginBtn').disabled = startAccountSelect.value === '';
        });

        // 复制账号按钮
        document.getElementById('copyAccountBtn').addEventListener('click', () => {
            const index = parseInt(startAccountSelect.value);
            if (isNaN(index)) {
                log('请先选择一个账号', 'warning');
                return;
            }
            const account = accounts[index];
            const email = account.email || account;
            require('electron').clipboard.writeText(email);
            log(`已复制账号: ${email}`, 'success');
        });

        // 已登录账号列表和当前选中窗口
        let loggedInAccounts = []; // [{email, windowId}]
        let currentWindowId = null;

        // 邮箱登录（每个账号独立窗口）
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const index = parseInt(startAccountSelect.value);
            if (isNaN(index)) return;

            const account = accounts[index];
            const email = account.email || account;
            const password = account.password || 'Cyh0711666';

            log(`新窗口登录账号: ${email}...`, 'info');
            document.getElementById('loginBtn').disabled = true;

            const result = await ipcRenderer.invoke('login-with-email', { email, password });

            // 使用后端返回的 windowId，如果没有则手动生成
            const windowId = result.windowId || `jimeng_${email.replace(/[^a-zA-Z0-9]/g, '_')}`;

            if (result.success) {
                log(`账号 ${email} 登录窗口已打开!`, 'success');
            } else {
                log(`窗口已打开，请手动登录`, 'info');
            }

            // 添加到已登录列表
            if (!loggedInAccounts.find(a => a.email === email)) {
                loggedInAccounts.push({ email, windowId });
            }

            // 设为当前窗口并更新UI
            setCurrentWindow(windowId, email);
            updateLoggedInAccountsUI();

            // 启用手动重试按钮
            document.getElementById('retryLoginBtn').disabled = false;
            document.getElementById('setParamsBtn').disabled = false;
            document.getElementById('loginBtn').disabled = false;
        });

        // 重试登录按钮 - 对当前选中的窗口重新执行登录
        document.getElementById('retryLoginBtn').addEventListener('click', async () => {
            if (!currentWindowId) {
                log('请先登录一个账号', 'error');
                return;
            }
            const account = loggedInAccounts.find(a => a.windowId === currentWindowId);
            if (!account) {
                log('找不到当前账号', 'error');
                return;
            }

            // 从 accounts 列表中获取密码
            const originalAccount = accounts.find(a => (a.email || a) === account.email);
            const password = originalAccount?.password || 'Cyh0711666';

            log(`重试登录: ${account.email}...`, 'info');
            document.getElementById('retryLoginBtn').disabled = true;

            const result = await ipcRenderer.invoke('retry-login', {
                windowId: currentWindowId,
                email: account.email,
                password: password
            });

            if (result.success) {
                log('登录重试成功', 'success');
            } else {
                log(`登录重试失败: ${result.error}`, 'error');
            }

            document.getElementById('retryLoginBtn').disabled = false;
        });

        // 设置默认参数按钮 - 对当前选中的窗口设置参数
        document.getElementById('setParamsBtn').addEventListener('click', async () => {
            if (!currentWindowId) {
                log('请先登录一个账号', 'error');
                return;
            }

            log('手动设置默认参数...', 'info');
            document.getElementById('setParamsBtn').disabled = true;

            const result = await ipcRenderer.invoke('set-params-for-window', { windowId: currentWindowId });

            if (result.success) {
                log('参数设置成功', 'success');
            } else {
                log(`参数设置失败: ${result.error}`, 'error');
            }

            document.getElementById('setParamsBtn').disabled = false;
        });

        // 设置当前窗口
        function setCurrentWindow(windowId, email) {
            currentWindowId = windowId;
            document.getElementById('taskSubmitArea').style.display = 'block';
            document.getElementById('currentWindowTitle').textContent = email;
            // 提交按钮始终可用（只要有窗口被选中）
            document.getElementById('submitTaskBtn').disabled = false;
        }

        // 更新已登录账号列表UI
        function updateLoggedInAccountsUI() {
            const container = document.getElementById('loggedInAccounts');
            if (loggedInAccounts.length > 0) {
                container.innerHTML = '<div style="color: #888; margin-bottom: 4px;">已打开的账号窗口:</div>' +
                    loggedInAccounts.map((a, idx) => {
                        const isActive = a.windowId === currentWindowId;
                        const style = isActive ? 'background: rgba(74, 222, 128, 0.3); border: 1px solid #4ade80;' : '';
                        // paramsSet: true=全部成功✓, false=有失败✗, undefined=未设置(等待中)
                        let statusIcon = '⏳ ';
                        let statusColor = '#888';
                        if (a.paramsSet === true) {
                            statusIcon = '✓ ';
                            statusColor = '#4ade80';
                        } else if (a.paramsSet === false) {
                            statusIcon = '✗ ';
                            statusColor = '#f87171';
                        }
                        return `<div class="status-item status-success" style="${style} cursor: pointer; color: ${statusColor};" onclick="selectAccountWindow(${idx})">${statusIcon}#${idx + 1}: ${a.email}</div>`;
                    }).join('');
            } else {
                container.innerHTML = '';
            }
        }

        // 选择账号窗口
        window.selectAccountWindow = function(idx) {
            const account = loggedInAccounts[idx];
            if (account) {
                setCurrentWindow(account.windowId, account.email);
                updateLoggedInAccountsUI();
            }
        };

        // 提交任务（针对当前选中的窗口）
        document.getElementById('submitTaskBtn').addEventListener('click', async () => {
            const text = document.getElementById('taskText').value;
            if (!text) {
                log('请输入文案内容', 'error');
                return;
            }

            if (!currentWindowId) {
                log('请先登录一个账号', 'error');
                return;
            }

            log('提交任务...', 'info');

            // 1. 解析文案并匹配素材
            const matchResult = await ipcRenderer.invoke('match-prompt-materials', {
                text: text,
                materials: materialsFiles
            });

            if (matchResult.matchedFiles && matchResult.matchedFiles.length > 0) {
                log(`匹配到 ${matchResult.matchedFiles.length} 个素材文件`, 'success');
                matchResult.matchedFiles.forEach(f => {
                    log(`  - ${f.category}: ${f.name}`, 'info');
                });

                // 显示生成的引用映射
                if (matchResult.generatedText) {
                    log('原始文案:', 'info');
                    log(matchResult.generatedText.originalText, 'info');
                    log('引用映射:', 'info');
                    Object.entries(matchResult.generatedText.references).forEach(([name, ref]) => {
                        log(`  "${name}" -> "${ref}"`, 'info');
                    });
                }

                // 2. 上传匹配的素材并填充文案
                const uploadResult = await ipcRenderer.invoke('upload-materials', {
                    files: matchResult.matchedFiles,
                    generatedText: matchResult.generatedText,
                    windowId: currentWindowId
                });

                if (uploadResult.success) {
                    log(`素材上传成功: ${uploadResult.count} 个文件`, 'success');
                } else {
                    log(`素材上传失败: ${uploadResult.error}`, 'warning');
                }

                // 上传完成后不需要再调用 submit-task，文案已在 upload-materials 中填充
                return;
            } else {
                log('没有匹配到素材文件', 'info');
            }

            // 没有素材匹配时，才单独填充文案
            const result = await ipcRenderer.invoke('submit-task', {
                taskData: {
                    text: text,
                    type: 'text-to-video'
                },
                windowId: currentWindowId
            });

            if (result.success) {
                log('任务提交成功!', 'success');
            } else {
                log(`任务提交失败: ${result.error}`, 'error');
            }
        });

        // 分析页面结构（针对当前选中的窗口）
        document.getElementById('analyzePageBtn').addEventListener('click', async () => {
            if (!currentWindowId) {
                log('请先登录一个账号', 'error');
                return;
            }

            log(`分析页面结构... (${currentWindowId})`, 'info');
            const result = await ipcRenderer.invoke('analyze-page', currentWindowId);
            if (result) {
                log('页面结构分析完成，请查看控制台日志', 'success');
            } else {
                log('分析失败，请确保窗口存在', 'error');
            }
        });

        // 提取视频链接
        document.getElementById('extractVideosBtn').addEventListener('click', async () => {
            log('提取当前页面视频链接...', 'info');
            const result = await ipcRenderer.invoke('extract-videos');
            if (result.success) {
                if (result.count > 0) {
                    log(`提取到 ${result.count} 个视频链接`, 'success');
                    result.videos.forEach((v, i) => {
                        const watermarkStatus = v.isWatermarkFree ? '(无水印)' : '';
                        log(`  ${i + 1}. ${v.url.substring(0, 50)}... ${watermarkStatus}`, 'info');
                    });
                } else {
                    log(result.message || '未找到视频链接', 'warning');
                }
            } else {
                log(`提取失败: ${result.error}`, 'error');
            }
        });

        // 打开即梦网站
        document.getElementById('openJimengBtn').addEventListener('click', async () => {
            log('打开即梦网站...', 'info');
            await ipcRenderer.invoke('open-jimeng');
        });

        // 清空视频记录
        document.getElementById('clearVideosBtn').addEventListener('click', () => {
            videosByWindow = {};
            updateVideoList();
            log('已清空拦截记录', 'info');
        });

        // 下载全部视频
        document.getElementById('downloadAllBtn').addEventListener('click', async () => {
            let totalVideos = 0;
            Object.values(videosByWindow).forEach(videos => {
                totalVideos += videos.length;
            });
            log(`开始下载 ${totalVideos} 个视频...`, 'info');

            for (const [windowId, videos] of Object.entries(videosByWindow)) {
                for (let i = 0; i < videos.length; i++) {
                    await downloadVideo(windowId, i);
                }
            }

            log('全部下载完成!', 'success');
        });

        // IPC 事件监听
        ipcRenderer.on('accounts-loaded', (event, data) => {
            accounts = data.accounts;
            updateAccountSelect();
            updateStartAccountSelect();
            log(`已加载 ${data.count} 个账号`, 'success');
        });

        ipcRenderer.on('login-result', (event, result) => {
            if (result.success) {
                log('登录请求已提交', 'success');
            } else {
                log(`登录失败: ${result.error}`, 'error');
            }
        });

        // 窗口关闭通知
        ipcRenderer.on('account-window-closed', (event, data) => {
            // 从已登录账号列表中移除
            const index = loggedInAccounts.findIndex(a => a.windowId === data.windowId);
            if (index !== -1) {
                const closedAccount = loggedInAccounts.splice(index, 1)[0];
                log(`账号窗口已关闭: ${closedAccount.email}`, 'warning');

                // 如果关闭的是当前选中的窗口，清除选中状态
                if (currentWindowId === data.windowId) {
                    currentWindowId = null;
                    document.getElementById('taskSubmitArea').style.display = 'none';
                    document.getElementById('submitTaskBtn').disabled = true;
                }

                updateLoggedInAccountsUI();
            }
        });

        ipcRenderer.on('video-intercepted', (event, video) => {
            // 获取来源窗口ID
            const windowId = video.windowId || 'unknown';

            // 初始化该窗口的视频数组
            if (!videosByWindow[windowId]) {
                videosByWindow[windowId] = [];
            }

            // 前端也做去重
            const urlKey = video.url.split('?')[0];
            const exists = videosByWindow[windowId].some(v => v.url.split('?')[0] === urlKey);
            if (!exists) {
                log(`拦截到视频 [${windowId}]: ${video.url.substring(0, 50)}...`, 'success');
                videosByWindow[windowId].push(video);
                updateVideoList();
            }
        });

        ipcRenderer.on('api-response', (event, data) => {
            log(`API: ${data.url} - ${data.status}`, 'info');
        });

        ipcRenderer.on('popup-handled', (event, data) => {
            if (data.handled) {
                log('已自动处理弹窗/协议', 'success');
            }
        });

        ipcRenderer.on('task-submitted', (event, result) => {
            if (result.success) {
                log('任务已提交', 'success');
            } else {
                log(`任务失败: ${result.error}`, 'error');
            }
        });

        ipcRenderer.on('qr-code-result', (event, result) => {
            if (result.success) {
                log('二维码显示成功', 'success');
            } else {
                log(`二维码显示失败: ${result.error}`, 'error');
            }
        });

        // 参数设置结果
        ipcRenderer.on('params-set', (event, result) => {
            if (result.success) {
                log('已设置默认生成参数', 'success');
                if (result.results) {
                    let allSuccess = true;
                    result.results.forEach(r => {
                        if (r.success) {
                            log(`${r.label}: ${r.value}`, 'info');
                        } else {
                            log(`${r.label}: ${r.error}`, 'error');
                            allSuccess = false;
                        }
                    });

                    // 更新账号的参数设置状态
                    if (result.windowId) {
                        const account = loggedInAccounts.find(a => a.windowId === result.windowId);
                        if (account) {
                            account.paramsSet = allSuccess;
                            account.paramsResults = result.results;
                            if (allSuccess) {
                                log(`账号 ${account.email} 默认参数全部设置完成`, 'success');
                            } else {
                                log(`账号 ${account.email} 部分参数设置失败`, 'warning');
                            }
                            updateLoggedInAccountsUI();
                        }
                    }
                }
            } else {
                log(`参数设置失败: ${result.error}`, 'warning');
            }
        });

        // 登录状态变化通知（保留但不自动检查）
        ipcRenderer.on('login-status-changed', (event, status) => {
            updateLoginStatus(status);
            // 参数设置结果现在通过 params-set 事件处理
        });

        // 接收调试信息
        ipcRenderer.on('debug-info', (event, info) => {
            log('=== 页面调试信息 ===', 'info');
            log('URL: ' + info.url, 'info');
            log('Title: ' + info.title, 'info');
            if (info.buttons && info.buttons.length > 0) {
                log('按钮: ' + info.buttons.join(' | '), 'info');
            }
            if (info.divs && info.divs.length > 0) {
                log('登录相关div: ' + info.divs.join(' | '), 'info');
            }
        });

        // 初始化
        log('系统已就绪 - 国际版（邮箱登录，支持多开）', 'success');

        // 素材管理状态
        let materialsFolder = '';
        let materialsFiles = [];

        // 自动加载上次的账号文件和素材文件夹
        setTimeout(async () => {
            // 自动加载上次的账号文件
            const result = await ipcRenderer.invoke('auto-load-last-accounts');
            if (result.count > 0) {
                log(`自动加载了 ${result.count} 个账号`, 'success');
            }

            // 自动加载上次的素材文件夹
            const matResult = await ipcRenderer.invoke('auto-load-last-materials');
            if (matResult && matResult.folder) {
                materialsFolder = matResult.folder;
                materialsFiles = matResult.files || [];
                updateMaterialsDisplay();
                log(`自动加载素材文件夹: ${matResult.folder}`, 'success');
            }
        }, 500);

        // 选择素材文件夹
        document.getElementById('selectMaterialsBtn').addEventListener('click', async () => {
            log('选择素材文件夹...', 'info');
            const result = await ipcRenderer.invoke('select-materials-folder');
            if (result.folder) {
                materialsFolder = result.folder;
                materialsFiles = result.files || [];
                updateMaterialsDisplay();
                log(`已选择文件夹: ${result.folder}`, 'success');
            }
        });

        // 上传素材到页面
        document.getElementById('uploadMaterialsBtn').addEventListener('click', async () => {
            if (!materialsFiles || materialsFiles.length === 0) {
                log('请先选择素材文件夹', 'error');
                return;
            }
            log('上传素材到页面...', 'info');
            const result = await ipcRenderer.invoke('upload-materials', { files: materialsFiles });
            if (result.success) {
                log(`已上传 ${result.count} 个素材`, 'success');
            } else {
                log(`上传失败: ${result.error}`, 'error');
            }
        });

        // 更新素材显示
        function updateMaterialsDisplay() {
            const folderDiv = document.getElementById('currentMaterialsFolder');
            const infoSpan = document.getElementById('materialsInfo');
            const listDiv = document.getElementById('materialsList');
            const uploadBtn = document.getElementById('uploadMaterialsBtn');

            if (materialsFolder) {
                folderDiv.textContent = `文件夹: ${materialsFolder}`;

                // 分类统计
                const imageFiles = materialsFiles.filter(f => f.type === 'image');
                const audioFiles = materialsFiles.filter(f => f.type === 'audio');
                const videoFiles = materialsFiles.filter(f => f.type === 'video');
                const otherFiles = materialsFiles.filter(f => f.type === 'unknown');

                infoSpan.textContent = `(图片:${imageFiles.length} 音频:${audioFiles.length})`;
                uploadBtn.disabled = !isLoggedIn;

                // 显示文件列表（按类型分组）
                listDiv.innerHTML = '';

                // 图片文件
                if (imageFiles.length > 0) {
                    const imgHeader = document.createElement('div');
                    imgHeader.style.cssText = 'color: #4ade80; margin: 8px 0 4px; font-weight: bold;';
                    imgHeader.textContent = `📷 图片 (${imageFiles.length})`;
                    listDiv.appendChild(imgHeader);

                    imageFiles.forEach(file => {
                        const div = document.createElement('div');
                        div.className = 'status-item status-success';
                        div.style.cssText = 'padding: 2px 8px; margin-bottom: 2px; font-size: 11px;';
                        div.textContent = file.name;
                        listDiv.appendChild(div);
                    });
                }

                // 音频文件
                if (audioFiles.length > 0) {
                    const audioHeader = document.createElement('div');
                    audioHeader.style.cssText = 'color: #60a5fa; margin: 8px 0 4px; font-weight: bold;';
                    audioHeader.textContent = `🎵 音频 (${audioFiles.length})`;
                    listDiv.appendChild(audioHeader);

                    audioFiles.forEach(file => {
                        const div = document.createElement('div');
                        div.className = 'status-item status-info';
                        div.style.cssText = 'padding: 2px 8px; margin-bottom: 2px; font-size: 11px; background: rgba(96, 165, 250, 0.2);';
                        div.textContent = file.name;
                        listDiv.appendChild(div);
                    });
                }

                // 视频文件
                if (videoFiles.length > 0) {
                    const videoHeader = document.createElement('div');
                    videoHeader.style.cssText = 'color: #f59e0b; margin: 8px 0 4px; font-weight: bold;';
                    videoHeader.textContent = `🎬 视频 (${videoFiles.length})`;
                    listDiv.appendChild(videoHeader);

                    videoFiles.forEach(file => {
                        const div = document.createElement('div');
                        div.className = 'status-item status-warning';
                        div.style.cssText = 'padding: 2px 8px; margin-bottom: 2px; font-size: 11px;';
                        div.textContent = file.name;
                        listDiv.appendChild(div);
                    });
                }

                // 其他文件（不显示或折叠）
                if (otherFiles.length > 0) {
                    const otherHeader = document.createElement('div');
                    otherHeader.style.cssText = 'color: #888; margin: 8px 0 4px;';
                    otherHeader.textContent = `📁 其他文件 (${otherFiles.length}) - 已忽略`;
                    listDiv.appendChild(otherHeader);
                }

            } else {
                folderDiv.textContent = '';
                infoSpan.textContent = '';
                listDiv.innerHTML = '';
                uploadBtn.disabled = true;
            }
        }

        // 等待后端验证实际登录状态并通知
        // login-status-changed 事件会自动更新状态
    </script>
</body>
</html>
